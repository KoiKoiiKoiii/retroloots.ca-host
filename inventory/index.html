<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Retro Loots | Retro Games, Cards & Collectibles</title>
        <meta name="description"
            content="Retro Loots ships collector-grade Funko Pops, retro games, trading cards and collectibles across Canada and the USA from Quebec.">
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="../css/styles.css">
        <script src="../js/site.js" defer></script>
        <script src="../js/cart.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
    <body data-page="inventory">
        <header class="site-header">
    <div class="logo">
        <a href="../">
            <img src="../logo.webp" alt="Retro Loots Logo">
        </a>
    </div>

    <nav class="site-nav">
        <a href="../" data-i18n-key="navHome">Home</a>
        <div class="nav-dropdown">
            <a href="../shop.html" class="nav-dropdown-trigger" data-i18n-key="navShop">Shop</a>
            <div class="nav-dropdown-menu">
                <a href="../shop.html?category=board-games" data-i18n-key="catBoardGames">Board Games</a>
                <a href="../shop.html?category=video-games" data-i18n-key="catVideoGames">Video Games</a>
                <a href="../shop.html?category=cards" data-i18n-key="catCards">Cards</a>
                <a href="../shop.html?category=movies" data-i18n-key="catMovies">Movies</a>
                <a href="../shop.html?category=toys" data-i18n-key="catToys">Toys</a>
            </div>
        </div>
        <a href="../shipping.html" data-i18n-key="navShipping">Shipping</a>
        <a href="../conditions.html" data-i18n-key="navConditions">Conditions</a>
        <a href="../contact.html" data-i18n-key="navContact">Contact</a>
        <a href="." class="active admin-only" data-i18n-key="navInventory">Inventory</a>
    </nav>
        <div class="header-top">
    <button id="langToggle" class="lang-btn" aria-label="Switch language">FR</button>
    <button id="cartButton" class="cart-btn" aria-label="Open cart" title="Cart">🛒 <span id="cartBadge" class="cart-badge">0</span></button>
    </div>
</header>
    


        <div id="authGate" class="auth-overlay" aria-hidden="false">
            <div class="auth-card">
                <h1>Admin Login</h1>
                <p>Inventory access is restricted to the administrative account.</p>
                <form id="adminLoginForm">
                    <label for="adminUsername">Username</label>
                    <input id="adminUsername" name="adminUsername" type="text" autocomplete="username" required>

                    <label for="adminPassword">Password</label>
                    <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" required>

                    <button type="submit" class="button button-primary">Log in</button>
                    <p id="authError" class="auth-error" aria-live="polite"></p>
                </form>
            </div>
        </div>

        <div id="inventoryContent" style="display:none;">
            <div class="filter-panel">
                <label for="dateFilter">Filter by date:</label>
                <select id="dateFilter" aria-label="Filter toys by date folder">
                    <option value="all">All Dates</option>
                </select>

                <label for="searchInput">Search:</label>
                <input type="text" id="searchInput" placeholder="Search by title..."
                    aria-label="Search toys by title">

                <label for="sortSelect">Sort:</label>
                <select id="sortSelect" aria-label="Sort toys">
                    <option value="date">Date Added</option>
                    <option value="name">Name (A-Z)</option>
                    <option value="price-asc">Price (Low-High)</option>
                    <option value="price-desc">Price (High-Low)</option>
                </select>

                <span id="itemCount" aria-live="polite" style="font-weight:700;">(0
                    items)</span>
            </div>

            <div id="pricingSummary" class="pricing-summary" style="display:none;">
                <div class="pricing-item">
                    <span class="pricing-label">Total Value:</span>
                    <span class="pricing-value" id="totalValue">$0.00</span>
                </div>
            <div class="pricing-item">
                <span class="pricing-label">Average Price:</span>
                <span class="pricing-value" id="averagePrice">$0.00</span>
            </div>
        </div>

        <div id="toyContainer"></div>

            <div class="load-more-container" style="display:none;">
                <button id="loadMoreBtn" type="button">Load More</button>
            </div>
        </div>

        <aside id="cartPanel" class="cart-panel" aria-hidden="true">
            <div class="cart-header">
                <h3 data-i18n-key="cartTitle">Your Cart</h3>
                <button id="closeCart" aria-label="Close cart">✕</button>
            </div>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-footer">
                <div class="cart-total"><span data-i18n-key="cartTotalLabel">Total:</span> <strong id="cartTotal">0.00</strong></div>
                <button id="checkoutBtn" class="checkout-btn" data-i18n-key="checkoutButton">Checkout</button>
            </div>
        </aside>

<script>

const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;

window.supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const sb = window.supabaseClient;

// ---------------- DOM ----------------
const toyContainer = document.getElementById('toyContainer');
const filterSelect = document.getElementById('dateFilter');
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const itemCountEl = document.getElementById('itemCount');
const pricingSummary = document.getElementById('pricingSummary');
const totalValueEl = document.getElementById('totalValue');
const averagePriceEl = document.getElementById('averagePrice');

const authGate = document.getElementById('authGate');
const adminLoginForm = document.getElementById('adminLoginForm');
const adminUsername = document.getElementById('adminUsername');
const adminPassword = document.getElementById('adminPassword');
const authError = document.getElementById('authError');
const inventoryContent = document.getElementById('inventoryContent');
const loadMoreBtn = document.getElementById('loadMoreBtn');

// ---------------- STORAGE ----------------
const STORAGE_FILTER = 'inventoryDateFilter';
const STORAGE_SCROLL = 'inventoryScrollY';
const STORAGE_SEARCH = 'inventorySearch';
const STORAGE_SORT = 'inventorySort';
const AUTH_STORAGE = 'adminInventoryAuthorized';

// ---------------- AUTH ----------------
const ADMIN_USERNAME = 'admin';
const ADMIN_PASSWORD = 'retr0loot@@';

// ---------------- STATE ----------------
let scrollSaveTimeout = null;
let allToys = [];
let currentFilteredToys = [];
let currentRenderCount = 0;
const DEFAULT_BATCH_SIZE = 20;

// ---------------- AUTH LOGIC ----------------
function isAdminAuthenticated() {
    return sessionStorage.getItem(AUTH_STORAGE) === 'true';
}

function setAdminAuthenticated(value) {
    if (value) sessionStorage.setItem(AUTH_STORAGE, 'true');
    else sessionStorage.removeItem(AUTH_STORAGE);
}

function updateAuthUI() {
    const authenticated = isAdminAuthenticated();
    authGate.style.display = authenticated ? 'none' : 'flex';
    inventoryContent.style.display = authenticated ? 'block' : 'none';
}

function handleLoginSuccess() {
    setAdminAuthenticated(true);
    authError.textContent = '';
    updateAuthUI();
    renderToys();
}

adminLoginForm.addEventListener('submit', (event) => {
    event.preventDefault();

    const u = adminUsername.value.trim();
    const p = adminPassword.value;

    if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
        handleLoginSuccess();
    } else {
        authError.textContent = 'Invalid username or password.';
    }
});

// ---------------- SUPABASE ----------------
async function populateDateFilter() {

    const { data, error } = await sb
        .from('inventory')
        .select('date');

    if (error) {
        console.error(error);
        return;
    }

    const uniqueDates = [...new Set(data.map(i => i.date))];

    filterSelect.innerHTML = '<option value="all">All Dates</option>';

    uniqueDates.sort().forEach(date => {
        const option = document.createElement('option');
        option.value = date;
        option.textContent = date;
        filterSelect.appendChild(option);
    });
}

async function loadToys(selected = 'all') {

    let query = sb.from('inventory').select('*');

    if (selected !== 'all') {
        query = query.eq('date', selected);
    }

    const { data, error } = await query;

    if (error) throw error;

    return assignItemNumbers(data.map(item => ({
        date: item.date,
        category: item.category,
        title: item.title,
        images: item.images,
        descriptionHtml: item.description_html
    })));
}

// ---------------- TOY PROCESSING ----------------
function assignItemNumbers(toys) {
    const map = {};

    toys.forEach(t => {
        if (!map[t.date]) map[t.date] = 0;
        map[t.date]++;
        t.itemNumber = map[t.date];
    });

    return toys;
}

// ---------------- COPY ----------------
function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
        const old = btn.innerHTML;
        btn.innerHTML = '✓';
        btn.classList.add('copied');

        setTimeout(() => {
            btn.innerHTML = old;
            btn.classList.remove('copied');
        }, 2000);
    });
}

// ---------------- PARSING ----------------
function extractDescriptionParts(html) {
    const div = document.createElement('div');
    div.innerHTML = html;

    let enDesc = '';
    let frDesc = '';
    let price = '';

    div.querySelectorAll('p').forEach(p => {
        const text = p.textContent;

        if (text.includes('Description (EN):')) {
            enDesc = text.replace('Description (EN):', '').trim();
        } else if (text.includes('Description (FR):')) {
            frDesc = text.replace('Description (FR):', '').trim();
        } else if (text.includes('Price:')) {
            price = text.replace('Price:', '').trim();
        }
    });

    return { enDesc, frDesc, price };
}

// ---------------- CARD UI ----------------
function createToyCard(toy) {

    const card = document.createElement('div');
    card.className = 'toy';

    const { enDesc, frDesc, price } =
        extractDescriptionParts(toy.descriptionHtml);

    const descriptionHTML = `
        <p><strong>Description (EN):</strong> ${enDesc}</p>
        <p><strong>Description (FR):</strong> ${frDesc}</p>
        <p><strong>Price:</strong> ${price}</p>
    `;

    card.innerHTML = `
        <div class="toy-number">${toy.date} Item #${toy.itemNumber}</div>

        <h2>${toy.title}</h2>

        <div class="toy-images">
            ${toy.images.map(img =>
                `<img src="${img.src}" alt="${img.alt}" loading="lazy">`
            ).join('')}
        </div>

        <div class="toy-description">${descriptionHTML}</div>
    `;

    return card;
}

// ---------------- FILTER + SORT ----------------
function applyFiltersAndSort(toys) {

    let filtered = [...toys];

    const selectedDate = filterSelect.value;
    if (selectedDate !== 'all') {
        filtered = filtered.filter(t => t.date === selectedDate);
    }

    const searchTerm = searchInput.value.toLowerCase();
    if (searchTerm) {
        filtered = filtered.filter(t =>
            t.title.toLowerCase().includes(searchTerm)
        );
    }

    const sortBy = sortSelect.value;

    if (sortBy === 'name') {
        filtered.sort((a, b) => a.title.localeCompare(b.title));
    }

    return filtered;
}

// ---------------- PRICING ----------------
function parsePrice(str) {
    const m = str.match(/[\d.]+/);
    return m ? parseFloat(m[0]) : 0;
}

function updatePricingSummary(toys) {

    if (!toys.length) {
        pricingSummary.style.display = 'none';
        return;
    }

    let total = 0;

    toys.forEach(t => {
        const { price } = extractDescriptionParts(t.descriptionHtml);
        total += parsePrice(price);
    });

    totalValueEl.textContent = `$${total.toFixed(2)}`;
    averagePriceEl.textContent = `$${(total / toys.length).toFixed(2)}`;

    pricingSummary.style.display = 'flex';
}

// ---------------- RENDER ----------------
async function renderToys() {

    toyContainer.innerHTML = '<p>Loading inventory…</p>';

    try {

        allToys = await loadToys('all');
        currentFilteredToys = applyFiltersAndSort(allToys);

        currentRenderCount = Math.min(
            DEFAULT_BATCH_SIZE,
            currentFilteredToys.length
        );

        updatePricingSummary(currentFilteredToys);
        renderVisibleToys();

    } catch (err) {

        console.error(err);
        toyContainer.innerHTML =
            `<p style="color:red;">${err.message}</p>`;
    }
}

function renderVisibleToys() {

    toyContainer.innerHTML = '';

    const visible = currentFilteredToys.slice(
        0,
        currentRenderCount
    );

    if (!visible.length) {
        toyContainer.innerHTML = '<p>No items found.</p>';
        return;
    }

    visible.forEach(t => {
        toyContainer.appendChild(createToyCard(t));
    });

    if (currentRenderCount < currentFilteredToys.length) {
        loadMoreBtn.style.display = 'inline-block';
    } else {
        loadMoreBtn.style.display = 'none';
    }
}

// ---------------- INIT ----------------
document.addEventListener('DOMContentLoaded', async () => {

    await populateDateFilter();
    updateAuthUI();

    if (isAdminAuthenticated()) {
        restoreUIState();
        await renderToys();
        restoreScrollPosition();
    }
});

// ---------------- UI STATE ----------------
function restoreUIState() {

    const f = localStorage.getItem(STORAGE_FILTER);
    if (f) filterSelect.value = f;

    const s = localStorage.getItem(STORAGE_SEARCH);
    if (s) searchInput.value = s;

    const so = localStorage.getItem(STORAGE_SORT);
    if (so) sortSelect.value = so;
}

function restoreScrollPosition() {
    const y = Number(localStorage.getItem(STORAGE_SCROLL));
    if (!Number.isNaN(y)) window.scrollTo(0, y);
}

function saveScroll() {
    localStorage.setItem(STORAGE_SCROLL, window.scrollY);
}

// ---------------- EVENTS ----------------
window.addEventListener('scroll', () => {
    if (scrollSaveTimeout) return;

    scrollSaveTimeout = setTimeout(() => {
        saveScroll();
        scrollSaveTimeout = null;
    }, 150);
}, { passive: true });

filterSelect.addEventListener('change', renderToys);
searchInput.addEventListener('input', renderToys);
sortSelect.addEventListener('change', renderToys);

loadMoreBtn.addEventListener('click', () => {
    currentRenderCount += DEFAULT_BATCH_SIZE;
    renderVisibleToys();
});

</script>

    </body>
    <footer class="site-footer">
    <p>&copy; 2026 Retro Loots. All rights reserved.</p>
    </footer>
</html>
