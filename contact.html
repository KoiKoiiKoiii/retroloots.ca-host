<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Retro Loots</title>
    <meta name="description" content="Get in touch with RetroLoots for support, information, or general inquiries.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/site.js" defer></script>
</head>
<body data-page="contact">
<header class="site-header">
    <div class="logo">
        <a href="/">
            <img src="logo.webp" alt="Retro Loots Logo">
        </a>
    </div>

    <nav class="site-nav">
        <a href="/" data-i18n-key="navHome">Home</a>
        <div class="nav-dropdown">
            <a href="/shop.html" class="nav-dropdown-trigger" data-i18n-key="navShop">Shop</a>
            <div class="nav-dropdown-menu">
                <a href="/shop.html?category=board-games" data-i18n-key="catBoardGames">Board Games</a>
                <a href="/shop.html?category=video-games" data-i18n-key="catVideoGames">Video Games</a>
                <a href="/shop.html?category=cards" data-i18n-key="catCards">Cards</a>
                <a href="/shop.html?category=movies" data-i18n-key="catMovies">Movies</a>
                <a href="/shop.html?category=toys" data-i18n-key="catToys">Toys</a>
            </div>
        </div>
        <a href="/shipping.html" data-i18n-key="navShipping">Shipping</a>
        <a href="/conditions.html" data-i18n-key="navConditions">Conditions</a>
        <a href="/contact.html" class="active" data-i18n-key="navContact">Contact</a>
        <a href="/inventory/" class="admin-only" data-i18n-key="navInventory">Inventory</a>
    </nav>
    <div class="header-top">
        <button id="langToggle" class="lang-btn" aria-label="Switch language">FR</button>
        <button id="cartButton" class="cart-btn" aria-label="Open cart" title="Cart">🛒 <span id="cartBadge" class="cart-badge">0</span></button>
    </div>
</header>

<main>
    <section class="hero-copy">
        <div>
            <h1 data-i18n-key="contactPageTitle">Get in Touch</h1>
            <p data-i18n-key="contactPageIntro">Have questions? We're here to help with support, information, or general inquiries.</p>
        </div>
    </section>

    <section class="content-section">
        <div class="contact-form-wrapper">
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="contactName" data-i18n-key="contactNameLabel">Name</label>
                    <input id="contactName" name="name" type="text" required>
                </div>

                <div class="form-group">
                    <label for="contactEmail" data-i18n-key="contactEmailLabel">Email</label>
                    <input id="contactEmail" name="email" type="email" required>
                </div>

                <div class="form-group">
                    <label for="contactSubject" data-i18n-key="contactSubjectLabel">Subject</label>
                    <select id="contactSubject" name="subject" required>
                        <option value="">-- Select --</option>
                        <option value="support" data-i18n-key="contactSubjectSupport">Support</option>
                        <option value="information" data-i18n-key="contactSubjectInfo">Information</option>
                        <option value="inquiry" data-i18n-key="contactSubjectInquiry">General Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="contactMessage" data-i18n-key="contactMessageLabel">Message</label>
                    <textarea id="contactMessage" name="message" rows="6" required></textarea>
                </div>

                <button type="submit" class="button button-primary" data-i18n-key="contactSubmitButton">Send Message</button>
                <p id="contactFormMessage" class="form-message" aria-live="polite"></p>
            </form>
        </div>
    </section>
</main>

<script>
document.getElementById('contactForm').addEventListener('submit', (event) => {
    event.preventDefault();
    const messageEl = document.getElementById('contactFormMessage');
    messageEl.textContent = 'Thank you for your message. We will get back to you soon!';
    messageEl.style.color = 'var(--accent-text)';
    event.target.reset();
});
</script>

</body>
</html>
