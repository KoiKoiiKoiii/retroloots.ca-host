<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      padding: 20px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }

    .sold {
      color: #00ff88;
    }

    .unsold {
      color: #ff4d4d;
    }
  </style>
</head>
<body>
  <div id="loginBox" style="
    position:fixed;
    inset:0;
    background:#0f0f0f;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
  ">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username" style="padding:10px;margin:5px;">
    <input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;">
    <button onclick="login()" style="padding:10px 20px;">Login</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <header>
    <h2>Retro Loots Admin</h2>
    <button onclick="logout()">Logout</button>
  </header>

  <div class="grid">
    <div class="card">
      <h3>Stats</h3>
      <p>Revenue: <strong id="revenue">$0</strong></p>
      <p>Sold Items: <strong id="soldCount">0</strong></p>
      <p>Active Items: <strong id="activeCount">0</strong></p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h3>Inventory</h3>
      <input id="search" placeholder="Search items..." style="margin-bottom:10px; width:100%; padding:8px;">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    let inventory = [];
    let orders = [];

    function getToken() {
      return sessionStorage.getItem("adminToken") || "";
    }

    function authHeaders() {
      return {
        "Authorization": `Bearer ${getToken()}`,
        "Content-Type": "application/json"
      };
    }

    async function fetchAdminJson(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          ...authHeaders(),
          ...(options.headers || {})
        }
      });

      if (res.status === 401) {
        sessionStorage.clear();
        document.getElementById("loginBox").style.display = "flex";
        throw new Error("Unauthorized");
      }

      if (!res.ok) {
        throw new Error(await res.text());
      }

      return res.json();
    }

    async function loadData() {
      const [inventoryData, ordersData] = await Promise.all([
        fetchAdminJson("/.netlify/functions/inventory-get"),
        fetchAdminJson("/.netlify/functions/orders-get")
      ]);

      inventory = Array.isArray(inventoryData) ? inventoryData : [];
      orders = Array.isArray(ordersData) ? ordersData : [];

      renderStats();
      renderInventory();
      renderOrders();
    }

    function renderStats() {
      const sold = inventory.filter((item) => item.sold).length;
      const active = inventory.filter((item) => !item.sold).length;
      const revenue = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);

      document.getElementById("soldCount").textContent = sold;
      document.getElementById("activeCount").textContent = active;
      document.getElementById("revenue").textContent = `$${revenue.toFixed(2)}`;
    }

    function renderOrders() {
      const el = document.getElementById("ordersTable");
      el.replaceChildren();

      orders.forEach((order) => {
        const row = document.createElement("tr");
        const id = document.createElement("td");
        const total = document.createElement("td");

        id.textContent = String(order.id || order.stripe_session || "").slice(0, 8);
        total.textContent = `$${Number(order.total || 0).toFixed(2)}`;

        row.append(id, total);
        el.appendChild(row);
      });
    }

    function renderInventory() {
      const el = document.getElementById("inventoryTable");
      const search = document.getElementById("search").value.toLowerCase();
      el.replaceChildren();

      inventory
        .filter((item) => String(item.title || "").toLowerCase().includes(search))
        .forEach((item) => {
          const row = document.createElement("tr");
          const title = document.createElement("td");
          const price = document.createElement("td");
          const status = document.createElement("td");
          const actions = document.createElement("td");
          const toggle = document.createElement("button");

          title.textContent = item.title || "";
          price.textContent = `$${Number(item.price || 0).toFixed(2)}`;
          status.className = item.sold ? "sold" : "unsold";
          status.textContent = item.sold ? "SOLD" : "ACTIVE";

          toggle.type = "button";
          toggle.textContent = "Toggle";
          toggle.addEventListener("click", () => toggleSold(item.id));
          actions.appendChild(toggle);

          row.append(title, price, status, actions);
          el.appendChild(row);
        });
    }

    window.toggleSold = async function(id) {
      const data = await fetchAdminJson("/.netlify/functions/inventory-toggle-sold", {
        method: "POST",
        body: JSON.stringify({ id })
      });

      if (data.success) {
        const item = inventory.find((candidate) => candidate.id === id);
        if (item) item.sold = !item.sold;

        renderInventory();
        renderStats();
      }
    };

    window.login = async function() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/.netlify/functions/login", {
        method: "POST",
        body: JSON.stringify({ username, password }),
        headers: { "Content-Type": "application/json" }
      });

      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem("adminToken", data.token);
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("loginError").textContent = "";
        loadData().catch((error) => {
          document.getElementById("loginError").textContent = error.message;
        });
      } else {
        document.getElementById("loginError").textContent = "Invalid credentials";
      }
    };

    window.logout = function() {
      sessionStorage.clear();
      location.reload();
    };

    document.getElementById("search").addEventListener("input", renderInventory);

    if (!getToken()) {
      document.getElementById("loginBox").style.display = "flex";
    } else {
      document.getElementById("loginBox").style.display = "none";
      loadData().catch(() => {
        sessionStorage.clear();
        document.getElementById("loginBox").style.display = "flex";
      });
    }
  </script>
</body>
</html>
