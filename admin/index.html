<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      padding: 20px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }

    .sold {
      color: #00ff88;
    }

    .unsold {
      color: #ff4d4d;
    }

    .admin-toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .admin-toolbar label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 700;
    }

    .admin-toolbar input,
    .admin-toolbar select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #101010;
      color: #fff;
    }

    .admin-count {
      padding-bottom: 8px;
      font-weight: 700;
      white-space: nowrap;
    }

    .admin-thumb-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .admin-thumb {
      width: 48px;
      height: 48px;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0;
      overflow: hidden;
      background: #090909;
    }

    .admin-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .admin-image-viewer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.86);
      z-index: 10000;
      padding: 20px;
    }

    .admin-image-viewer.open {
      display: flex;
    }

    .admin-image-viewer img {
      max-width: min(100%, 980px);
      max-height: 86vh;
      object-fit: contain;
      border-radius: 8px;
    }
  #inventoryTable button {
    width: 100%;
  }
    .admin-image-viewer button {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 0;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      background: #fff;
      color: #111;
      font-size: 22px;
    }

@media (max-width: 900px) {
  .grid {
  grid-template-columns: 1fr;
}

table:has(#inventoryTable) thead {
  display: none;
}

  .admin-toolbar {
    grid-template-columns: 1fr;
  }

  #inventoryTable tr {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #171717;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }

  #inventoryTable td {
    border: 0;
    padding: 0;
  }

  #inventoryTable td:first-child {
    margin-bottom: 6px;
  }


  #inventoryTable .admin-thumb-list {
    justify-content: flex-start;
    margin-bottom: 8px;
  }

  #inventoryTable .admin-thumb {
    width: 60px;
    height: 60px;
  }

  #inventoryTable td:nth-child(2)::before {
    content: "Title";
    font-weight: bold;
    color: #aaa;
  }

  #inventoryTable td:nth-child(3)::before {
    content: "Date";
    font-weight: bold;
    color: #aaa;
  }

  #inventoryTable td:nth-child(4)::before {
    content: "Price";
    font-weight: bold;
    color: #aaa;
  }

  #inventoryTable td:nth-child(5)::before {
    content: "Status";
    font-weight: bold;
    color: #aaa;
  }

  #inventoryTable td:nth-child(6)::before {
    content: "Actions";
    font-weight: bold;
    color: #aaa;
  }

    #inventoryTable td:last-child {
    margin-top: 8px;
  }
  #inventoryTable td::before {
    margin-right: 12px;
  }
    .admin-thumb {
    width: 72px;
    height: 72px;
  }

  #inventoryTable td:nth-child(2),
#inventoryTable td:nth-child(3),
#inventoryTable td:nth-child(4),
#inventoryTable td:nth-child(5),
#inventoryTable td:nth-child(6) {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
}
  </style>
</head>
<body>
  <div id="loginBox" style="
    position:fixed;
    inset:0;
    background:#0f0f0f;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
  ">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username" style="padding:10px;margin:5px;">
    <input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;">
    <button onclick="login()" style="padding:10px 20px;">Login</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <header>
    <h2>Retro Loots Admin</h2>
    <button onclick="logout()">Logout</button>
  </header>

  <div class="grid">
    <div class="card">
      <h3>Stats</h3>
      <p>Revenue: <strong id="revenue">$0</strong></p>
      <p>Sold Items: <strong id="soldCount">0</strong></p>
      <p>Active Items: <strong id="activeCount">0</strong></p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h3>Inventory</h3>
      <div class="admin-toolbar">
        <div>
          <label for="dateFilter">Date</label>
          <select id="dateFilter" aria-label="Filter inventory by date">
            <option value="all">All Dates</option>
          </select>
        </div>
        <div>
          <label for="statusFilter">Status</label>
          <select id="statusFilter" aria-label="Filter inventory by status">
            <option value="all">All Statuses</option>
            <option value="active">Active</option>
            <option value="sold">Sold</option>
          </select>
        </div>
        <div>
          <label for="search">Search</label>
          <input id="search" placeholder="Search items..." type="search">
        </div>
        <div>
          <label for="sortSelect">Sort</label>
          <select id="sortSelect" aria-label="Sort inventory">
            <option value="date-desc">Date Added</option>
            <option value="date-asc">Date Oldest</option>
            <option value="name">Name (A-Z)</option>
            <option value="price-asc">Price (Low-High)</option>
            <option value="price-desc">Price (High-Low)</option>
            <option value="status">Status</option>
          </select>
        </div>
        <span id="itemCount" class="admin-count">(0 items)</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Images</th>
            <th>Title</th>
            <th>Date</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
        
      </table>
      <div style="padding:15px;text-align:center;">
  <button id="loadMoreBtn">Load More</button>
</div>
    </div>
  </div>

  <div id="imageViewer" class="admin-image-viewer" aria-hidden="true">
    <button id="imageViewerClose" type="button" aria-label="Close image">&times;</button>
    <img id="imageViewerImg" alt="">
  </div>

  <script type="module">
    let inventory = [];
    let orders = [];
const PAGE_SIZE = 10;
let currentPage = 1;
const imageCache = new Map();
    const dateFilter = document.getElementById("dateFilter");
    const statusFilter = document.getElementById("statusFilter");
    const searchInput = document.getElementById("search");
    const sortSelect = document.getElementById("sortSelect");
    const itemCount = document.getElementById("itemCount");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    const imageViewer = document.getElementById("imageViewer");
    const imageViewerImg = document.getElementById("imageViewerImg");
    const imageViewerClose = document.getElementById("imageViewerClose");

    function getToken() {
      return sessionStorage.getItem("adminToken") || "";
    }

    function authHeaders() {
      return {
        "Authorization": `Bearer ${getToken()}`,
        "Content-Type": "application/json"
      };
    }

async function fetchAdminJson(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      ...authHeaders(),
      ...(options.headers || {})
    }
  });

  if (res.status === 401) {
    sessionStorage.clear();
    document.getElementById("loginBox").style.display = "flex";
    throw new Error("Unauthorized");
  }

  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`Request failed ${res.status}: ${text}`);
  }

  return res.json();
}

async function loadData() {
  try {
    const [inventoryData, ordersData] = await Promise.all([
      fetchAdminJson("/.netlify/functions/inventory-get"),
      fetchAdminJson("/.netlify/functions/orders-get")
    ]);

    inventory = Array.isArray(inventoryData) ? inventoryData : [];
    orders = Array.isArray(ordersData) ? ordersData : [];

    populateDateFilter();

currentPage = 1;

renderStats();
renderInventory();
renderOrders();

  } catch (err) {
    console.error(err);

    const el = document.getElementById("inventoryTable");
    el.replaceChildren();

    const error = document.createElement("div");
    error.textContent = err.message;
    error.style.color = "red";
    el.appendChild(error);
  }
}
    function renderStats() {
      const sold = inventory.filter((item) => item.sold).length;
      const active = inventory.filter((item) => !item.sold).length;
      const revenue = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);

      document.getElementById("soldCount").textContent = sold;
      document.getElementById("activeCount").textContent = active;
      document.getElementById("revenue").textContent = `$${revenue.toFixed(2)}`;
    }

    function renderOrders() {
      const el = document.getElementById("ordersTable");
      el.replaceChildren();

      orders.forEach((order) => {
        const row = document.createElement("tr");
        const id = document.createElement("td");
        const total = document.createElement("td");

        id.textContent = String(order.id || order.stripe_session || "").slice(0, 8);
        total.textContent = `$${Number(order.total || 0).toFixed(2)}`;

        row.append(id, total);
        el.appendChild(row);
      });
    }

    function populateDateFilter() {
      const current = dateFilter.value;
      const dates = [...new Set(inventory.map((item) => item.date).filter(Boolean))].sort().reverse();

      dateFilter.replaceChildren();
      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = "All Dates";
      dateFilter.appendChild(allOption);

      dates.forEach((date) => {
        const option = document.createElement("option");
        option.value = date;
        option.textContent = date;
        dateFilter.appendChild(option);
      });

      dateFilter.value = dates.includes(current) ? current : "all";
    }
function preloadImage(src) {
  if (!src || imageCache.has(src)) return;

  const img = new Image();
  img.src = src;

  img.onload = () => imageCache.set(src, true);
  img.onerror = () => imageCache.set(src, false);
}

function preloadFilteredImages(items) {
  items.forEach(item => {
    (item.images || []).forEach(image => {
      const src = getImageSrc(image);
      preloadImage(src);
    });
  });
}
    function getImageSrc(image) {
      const src = image && image.src ? String(image.src) : "";
      if (!src) return "";
      if (src.startsWith("http") || src.startsWith("/")) return src;
      return `../inventory/${src}`;
    }

    function getFilteredInventory() {
      const search = searchInput.value.trim().toLowerCase();
      const selectedDate = dateFilter.value;
      const selectedStatus = statusFilter.value;
      const sort = sortSelect.value;

      const filtered = inventory.filter((item) => {
        const matchesSearch = !search || String(item.title || "").toLowerCase().includes(search);
        const matchesDate = selectedDate === "all" || item.date === selectedDate;
        const matchesStatus =
          selectedStatus === "all" ||
          (selectedStatus === "sold" && item.sold) ||
          (selectedStatus === "active" && !item.sold);

        return matchesSearch && matchesDate && matchesStatus;
      });

      filtered.sort((a, b) => {
        if (sort === "name") return String(a.title || "").localeCompare(String(b.title || ""));
        if (sort === "price-asc") return Number(a.price || 0) - Number(b.price || 0);
        if (sort === "price-desc") return Number(b.price || 0) - Number(a.price || 0);
        if (sort === "status") return Number(a.sold) - Number(b.sold) || String(a.title || "").localeCompare(String(b.title || ""));
        if (sort === "date-asc") return String(a.created_at || a.date || "").localeCompare(String(b.created_at || b.date || ""));
        return String(b.created_at || b.date || "").localeCompare(String(a.created_at || a.date || ""));
      });

      return filtered;
    }

    function showImage(src, alt) {
      imageViewerImg.src = src;
      imageViewerImg.alt = alt || "";
      imageViewer.classList.add("open");
      imageViewer.setAttribute("aria-hidden", "false");
    }

    function hideImage() {
      imageViewer.classList.remove("open");
      imageViewer.setAttribute("aria-hidden", "true");
      imageViewerImg.src = "";
    }

    function renderInventory() {
      const el = document.getElementById("inventoryTable");
      el.replaceChildren();
      const filtered = getFilteredInventory();

const end = currentPage * PAGE_SIZE;
const visibleItems = filtered.slice(0, end);

preloadFilteredImages(visibleItems);
      itemCount.textContent = `(${filtered.length} ${filtered.length === 1 ? "item" : "items"})`;
loadMoreBtn.style.display =
    end < filtered.length ? "inline-block" : "none";
      visibleItems
        .forEach((item) => {
          const row = document.createElement("tr");
          const images = document.createElement("td");
          const title = document.createElement("td");
          const date = document.createElement("td");
          const price = document.createElement("td");
          const status = document.createElement("td");
          const actions = document.createElement("td");
          const toggle = document.createElement("button");
          const imageList = document.createElement("div");

          imageList.className = "admin-thumb-list";
          (Array.isArray(item.images) ? item.images : []).slice(0, 3).forEach((image) => {
            const src = getImageSrc(image);
            if (!src) return;

            const button = document.createElement("button");
            const img = document.createElement("img");

            button.type = "button";
            button.className = "admin-thumb";
            button.title = "View image";
            button.addEventListener("click", () => showImage(src, image.alt || item.title || ""));

            img.src = src;
            img.alt = image.alt || item.title || "Inventory image";
            img.loading = "lazy";

            button.appendChild(img);
            imageList.appendChild(button);
          });

          images.appendChild(imageList);
          title.textContent = item.title || "";
          date.textContent = item.date || "";
          price.textContent = `$${Number(item.price || 0).toFixed(2)}`;
          status.className = item.sold ? "sold" : "unsold";
          status.textContent = item.sold ? "SOLD" : "ACTIVE";

          toggle.type = "button";
          toggle.textContent = "Toggle";
          toggle.addEventListener("click", () => toggleSold(item.id));
          actions.appendChild(toggle);

          row.append(images, title, date, price, status, actions);
          row.dataset.title = item.title || "";
row.dataset.price = `$${Number(item.price || 0).toFixed(2)}`;
row.dataset.status = item.sold ? "SOLD" : "ACTIVE";
          el.appendChild(row);
          
        });
    }
    

    window.toggleSold = async function(id) {
      const data = await fetchAdminJson("/.netlify/functions/inventory-toggle-sold", {
        method: "POST",
        body: JSON.stringify({ id })
      });

      if (data.success) {
        const item = inventory.find((candidate) => candidate.id === id);
        if (item) item.sold = !item.sold;

        renderInventory();
        renderStats();
      }
    };

    window.login = async function() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/.netlify/functions/login", {
        method: "POST",
        body: JSON.stringify({ username, password }),
        headers: { "Content-Type": "application/json" }
      });

      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem("adminToken", data.token);
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("loginError").textContent = "";
        loadData().catch((error) => {
          document.getElementById("loginError").textContent = error.message;
        });
      } else {
        document.getElementById("loginError").textContent = "Invalid credentials";
      }
    };

    window.logout = function() {
      sessionStorage.clear();
      location.reload();
    };
loadMoreBtn.addEventListener("click", () => {
  currentPage++;
  renderInventory();
});
function resetAndRender() {
  currentPage = 1;
  renderInventory();
}

dateFilter.addEventListener("change", resetAndRender);
statusFilter.addEventListener("change", resetAndRender);
searchInput.addEventListener("input", resetAndRender);
sortSelect.addEventListener("change", resetAndRender);
    imageViewerClose.addEventListener("click", hideImage);
    imageViewer.addEventListener("click", (event) => {
      if (event.target === imageViewer) hideImage();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") hideImage();
    });

    if (!getToken()) {
      document.getElementById("loginBox").style.display = "flex";
    } else {
      document.getElementById("loginBox").style.display = "none";
      loadData().catch(() => {
        sessionStorage.clear();
        document.getElementById("loginBox").style.display = "flex";
      });
    }
  </script>
</body>
</html>
