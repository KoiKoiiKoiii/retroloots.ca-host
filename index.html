<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inventory</title>
        <meta name="description"
            content="Documentation and details all items in your inventory.">
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="header-top">
            <h1>Inventory</h1>
            <button id="darkModeToggle" class="dark-mode-btn"
                aria-label="Toggle dark mode"
                title="Toggle dark mode (D)">🌙</button>
        </div>

        <div class="filter-panel">
            <label for="dateFilter">Filter by date:</label>
            <select id="dateFilter" aria-label="Filter toys by date folder">
                <option value="all">All Dates</option>
                <option value="5-27-26">5-27-26</option>
                <option value="5-28-26">5-28-26</option>
                <option value="5-29-26">5-29-26</option>
                <option value="5-30-26">5-30-26</option>

            </select>

            <label for="searchInput">Search:</label>
            <input type="text" id="searchInput" placeholder="Search by title..."
                aria-label="Search toys by title">

            <label for="sortSelect">Sort:</label>
            <select id="sortSelect" aria-label="Sort toys">
                <option value="date">Date Added</option>
                <option value="name">Name (A-Z)</option>
                <option value="price-asc">Price (Low-High)</option>
                <option value="price-desc">Price (High-Low)</option>
            </select>

            <span id="itemCount" aria-live="polite" style="font-weight:700;">(0
                items)</span>
        </div>

        <div id="pricingSummary" class="pricing-summary" style="display:none;">
            <div class="pricing-item">
                <span class="pricing-label">Total Value:</span>
                <span class="pricing-value" id="totalValue">$0.00</span>
            </div>
            <div class="pricing-item">
                <span class="pricing-label">Average Price:</span>
                <span class="pricing-value" id="averagePrice">$0.00</span>
            </div>
        </div>

        <div id="toyContainer"></div>

        <div class="load-more-container" style="display:none;">
            <button id="loadMoreBtn" type="button">Load More</button>
        </div>

        <script>
        const toyContainer = document.getElementById('toyContainer');
        const filterSelect = document.getElementById('dateFilter');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const itemCountEl = document.getElementById('itemCount');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const pricingSummary = document.getElementById('pricingSummary');
        const totalValueEl = document.getElementById('totalValue');
        const averagePriceEl = document.getElementById('averagePrice');
        
        const toyDataCache = {};
        const STORAGE_FILTER = 'inventoryDateFilter';
        const STORAGE_SCROLL = 'inventoryScrollY';
        const STORAGE_SEARCH = 'inventorySearch';
        const STORAGE_SORT = 'inventorySort';
        const STORAGE_DARK_MODE = 'inventoryDarkMode';
        const availableDates = Array.from(filterSelect.options)
            .map(option => option.value)
            .filter(value => value !== 'all');

        let scrollSaveTimeout = null;
        let allToys = [];
let currentFilteredToys = [];
let currentRenderCount = 0;
const DEFAULT_BATCH_SIZE = 20;

function getBatchSize() {
    return DEFAULT_BATCH_SIZE;
}

const loadMoreBtn = document.getElementById('loadMoreBtn');
        function saveScroll() {
            localStorage.setItem(STORAGE_SCROLL, String(window.scrollY));
        }

        function onScroll() {
            if (scrollSaveTimeout !== null) return;
            scrollSaveTimeout = setTimeout(() => {
                saveScroll();
                scrollSaveTimeout = null;
            }, 150);
        }

        // Dark mode
        function initDarkMode() {
            const isDark = localStorage.getItem(STORAGE_DARK_MODE) === 'true';
            if (isDark) {
                document.documentElement.setAttribute('data-dark-mode', 'true');
            }
            updateDarkModeButton();
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.getAttribute('data-dark-mode') === 'true';
            if (isDark) {
                document.documentElement.removeAttribute('data-dark-mode');
                localStorage.setItem(STORAGE_DARK_MODE, 'false');
            } else {
                document.documentElement.setAttribute('data-dark-mode', 'true');
                localStorage.setItem(STORAGE_DARK_MODE, 'true');
            }
            updateDarkModeButton();
        }

        function updateDarkModeButton() {
            const isDark = document.documentElement.getAttribute('data-dark-mode') === 'true';
            darkModeToggle.textContent = isDark ? '☀️' : '🌙';
        }

        darkModeToggle.addEventListener('click', toggleDarkMode);

        window.addEventListener('scroll', onScroll, { passive: true });

        async function fetchToyData(date) {
            if (toyDataCache[date]) {
                return toyDataCache[date];
            }
            const url = `data/${date}.json`;
            let response;
            try {
                response = await fetch(url);
            } catch (error) {
                throw new Error(`Failed to load ${url}. If you opened this page as a local file (file://), use a local web server or host the site on GitHub Pages.`);
            }
            if (!response.ok) {
                throw new Error(`Unable to load ${url}: ${response.status} ${response.statusText}`);
            }
            const data = await response.json();
            toyDataCache[date] = data;
            return data;
        }

        async function loadToys(selected = 'all') {
            if (selected === 'all') {
                const allData = await Promise.all(availableDates.map(fetchToyData));
                const toys = allData.flat();
                return assignItemNumbers(toys);
            }
            const toys = await fetchToyData(selected);
            return assignItemNumbers(toys);
        }

        function assignItemNumbers(toys) {
            const numbersByDate = {};
            toys.forEach(toy => {
                if (!numbersByDate[toy.date]) {
                    numbersByDate[toy.date] = 0;
                }
                numbersByDate[toy.date]++;
                toy.itemNumber = numbersByDate[toy.date];
            });
            return toys;
        }

        function copyToClipboard(text, copyButton) {
            navigator.clipboard.writeText(text).then(() => {
                const originalSvg = copyButton.innerHTML;
                copyButton.innerHTML = '✓';
                copyButton.classList.add('copied');

                setTimeout(() => {
                    copyButton.innerHTML = originalSvg;
                    copyButton.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        function extractDescriptionParts(htmlDescription) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlDescription;

            let enDesc = '';
            let frDesc = '';
            let price = '';

            const paragraphs = tempDiv.querySelectorAll('p');
            paragraphs.forEach(p => {
                const text = p.textContent;
                if (text.includes('Description (EN):')) {
                    enDesc = text.replace('Description (EN):', '').trim();
                } else if (text.includes('Description (FR):')) {
                    frDesc = text.replace('Description (FR):', '').trim();
                } else if (text.includes('Price:')) {
                    price = text.replace('Price:', '').trim();
                }
            });

            return { enDesc, frDesc, price };
        }

        function createCopyButton(dataAttr) {
            return `<svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-copy="${dataAttr}">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>`;
        }

        function createToyCard(toy) {
            const card = document.createElement('div');
            card.className = 'toy';
            card.dataset.date = toy.date;

            const { enDesc, frDesc, price } = extractDescriptionParts(toy.descriptionHtml);

            const descriptionWithIcons = `
                <p><svg class="copy-icon copy-btn-en" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; display: inline; margin-right: 6px; vertical-align: middle;"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg><strong>Description (EN):</strong> ${enDesc}</p>
                <p><svg class="copy-icon copy-btn-fr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; display: inline; margin-right: 6px; vertical-align: middle;"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg><strong>Description (FR):</strong> ${frDesc}</p>
                <p><svg class="copy-icon copy-btn-price" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; display: inline; margin-right: 6px; vertical-align: middle;"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg><strong>Price:</strong> ${price}</p>
            `;

            card.innerHTML = `
                <div class="toy-number">${toy.date} Item #${toy.itemNumber}</div>
                <div class="copy-wrapper">
                    <h2 style="margin: 0; flex: 1;">${toy.title}</h2>
                    <svg class="copy-icon copy-btn-title" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                </div>
                <div class="toy-images">${toy.images.map(img => `<img src="${img.src}" alt="${img.alt}" loading="lazy" decoding="async">`).join('')}
                </div>
                <div class="toy-description">${descriptionWithIcons}</div>
            `;

            const titleBtn = card.querySelector('.copy-btn-title');
            const enBtn = card.querySelector('.copy-btn-en');
            const frBtn = card.querySelector('.copy-btn-fr');
            const priceBtn = card.querySelector('.copy-btn-price');

            titleBtn.addEventListener('click', () => {
                copyToClipboard(toy.title, titleBtn);
            });

            enBtn.addEventListener('click', () => {
                copyToClipboard(enDesc, enBtn);
            });

            frBtn.addEventListener('click', () => {
                copyToClipboard(frDesc, frBtn);
            });

            priceBtn.addEventListener('click', () => {
                copyToClipboard(price, priceBtn);
            });

            return card;
        }

        function updateItemCount(displayCount, totalCount) {
    if (!itemCountEl) return;

    if (displayCount >= totalCount) {
        itemCountEl.textContent =
            `(${totalCount} items)`;
    } else {
        itemCountEl.textContent =
            `(${displayCount} of ${totalCount} items)`;
    }
}

        function parsePrice(priceStr) {
            const match = priceStr.match(/[\d.]+/);
            return match ? parseFloat(match[0]) : 0;
        }

        function updatePricingSummary(toys) {
            if (toys.length === 0) {
                pricingSummary.style.display = 'none';
                return;
            }

            let totalPrice = 0;
            toys.forEach(toy => {
                const { price } = extractDescriptionParts(toy.descriptionHtml);
                totalPrice += parsePrice(price);
            });

            const avgPrice = toys.length > 0 ? (totalPrice / toys.length) : 0;
            totalValueEl.textContent = '$' + totalPrice.toFixed(2);
            averagePriceEl.textContent = '$' + avgPrice.toFixed(2);
            pricingSummary.style.display = 'flex';
        }

        function applyFiltersAndSort(toys) {
            // Filter by date
            let filtered = toys;
            const selectedDate = filterSelect.value;
            if (selectedDate !== 'all') {
                filtered = filtered.filter(toy => toy.date === selectedDate);
            }

            // Filter by search
            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(toy => toy.title.toLowerCase().includes(searchTerm));
            }

            // Sort
            const sortBy = sortSelect.value;
            const sorted = [...filtered];
            
            if (sortBy === 'name') {
                sorted.sort((a, b) => a.title.localeCompare(b.title));
            } else if (sortBy === 'price-asc') {
                sorted.sort((a, b) => {
                    const priceA = parsePrice(extractDescriptionParts(a.descriptionHtml).price);
                    const priceB = parsePrice(extractDescriptionParts(b.descriptionHtml).price);
                    return priceA - priceB;
                });
            } else if (sortBy === 'price-desc') {
                sorted.sort((a, b) => {
                    const priceA = parsePrice(extractDescriptionParts(a.descriptionHtml).price);
                    const priceB = parsePrice(extractDescriptionParts(b.descriptionHtml).price);
                    return priceB - priceA;
                });
            }
            // 'date' is default, no additional sorting needed

            return sorted;
        }

        async function renderToys() {
    toyContainer.innerHTML = '<p>Loading inventory…</p>';

    try {
        allToys = await loadToys('all');

        currentFilteredToys = applyFiltersAndSort(allToys);

        currentRenderCount = Math.min(
            getBatchSize(),
            currentFilteredToys.length
        );

        updatePricingSummary(currentFilteredToys);

        renderVisibleToys();

    } catch (error) {
        updateItemCount(0);
        toyContainer.innerHTML =
            `<p style="color:red;">${error.message}</p>`;
        console.error(error);
    }
}

        function saveUIState() {
            localStorage.setItem(STORAGE_FILTER, filterSelect.value);
            localStorage.setItem(STORAGE_SEARCH, searchInput.value);
            localStorage.setItem(STORAGE_SORT, sortSelect.value);
        }

        function restoreUIState() {
            const savedFilter = localStorage.getItem(STORAGE_FILTER);
            if (savedFilter && (savedFilter === 'all' || availableDates.includes(savedFilter))) {
                filterSelect.value = savedFilter;
            }
            
            const savedSearch = localStorage.getItem(STORAGE_SEARCH);
            if (savedSearch) {
                searchInput.value = savedSearch;
            }

            const savedSort = localStorage.getItem(STORAGE_SORT);
            if (savedSort) {
                sortSelect.value = savedSort;
            }
        }

        function restoreScrollPosition() {
            const stored = localStorage.getItem(STORAGE_SCROLL);
            if (!stored) return;
            const y = Number(stored);
            if (!Number.isNaN(y)) {
                window.scrollTo(0, y);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'd' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                toggleDarkMode();
            }
        });
loadMoreBtn.addEventListener('click', () => {
    currentRenderCount = Math.min(
        currentFilteredToys.length,
        currentRenderCount + getBatchSize()
    );

    renderVisibleToys();
});

let loadingMore = false;

window.addEventListener('scroll', () => {
    const nearBottom =
        window.innerHeight + window.scrollY >=
        document.documentElement.scrollHeight - 300;

    if (
        nearBottom &&
        !loadingMore &&
        currentRenderCount < currentFilteredToys.length
    ) {
        loadingMore = true;

        currentRenderCount = Math.min(
            currentFilteredToys.length,
            currentRenderCount + getBatchSize()
        );

        renderVisibleToys();

        setTimeout(() => {
            loadingMore = false;
        }, 100);
    }
});

        filterSelect.addEventListener('change', () => {
            saveUIState();
            renderToys();
            requestAnimationFrame(restoreScrollPosition);
        });

        searchInput.addEventListener('input', () => {
            saveUIState();
            renderToys();
            requestAnimationFrame(restoreScrollPosition);
        });

        sortSelect.addEventListener('change', () => {
            saveUIState();
            renderToys();
            requestAnimationFrame(restoreScrollPosition);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            initDarkMode();
            restoreUIState();
            await renderToys();
            restoreScrollPosition();
        });
        

        function renderVisibleToys() {
            loadMoreBtn.style.display = 'none';
    toyContainer.innerHTML = '';
    const visibleToys = currentFilteredToys.slice(0, currentRenderCount);

    if (visibleToys.length === 0) {
        toyContainer.innerHTML = '<p>No items found.</p>';
        loadMoreBtn.style.display = 'none';
        return;
    }

    visibleToys.forEach(toy =>
        toyContainer.appendChild(createToyCard(toy))
    );

    updateItemCount(
        Math.min(currentRenderCount, currentFilteredToys.length),
        currentFilteredToys.length
    );

    if (currentRenderCount < currentFilteredToys.length) {
        const remaining =
            currentFilteredToys.length - currentRenderCount;

        loadMoreBtn.style.display = 'inline-block';
        loadMoreBtn.textContent =
            `Load ${Math.min(getBatchSize(), remaining)} more`;
    } else {
        loadMoreBtn.style.display = 'none';
    }
}
        </script>

    </body>
</html>
